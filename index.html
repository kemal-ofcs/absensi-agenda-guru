<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Scanner Absensi Guru</title>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #f3f6fb;
      color: #1f2937;
    }

    .container {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
    }

    .judul {
      margin-bottom: 20px;
      text-align: center;
    }

    .judul h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    .judul p {
      margin: 0;
      color: #6b7280;
      font-size: 14px;
    }

    .card {
      margin-bottom: 16px;
      padding: 16px;
      border-radius: 14px;
      background: #ffffff;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
    }

    #reader {
      width: 100%;
      overflow: hidden;
      border-radius: 10px;
      background: #111827;
    }

    .tombol {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    button {
      flex: 1;
      padding: 13px 16px;
      border: none;
      border-radius: 9px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    #tombolMulai {
      background: #2563eb;
      color: #ffffff;
    }

    #tombolBerhenti {
      background: #e5e7eb;
      color: #1f2937;
    }

    .hasil {
      min-height: 110px;
      border-left: 5px solid #9ca3af;
    }

    .hasil.idle {
      border-left-color: #9ca3af;
    }

    .hasil.loading {
      border-left-color: #f59e0b;
      background: #fffbeb;
    }

    .hasil.sukses {
      border-left-color: #16a34a;
      background: #f0fdf4;
    }

    .hasil.gagal {
      border-left-color: #dc2626;
      background: #fef2f2;
    }

    #judulHasil {
      margin: 0 0 10px;
      font-size: 18px;
    }

    #detailHasil {
      margin: 0;
      color: #4b5563;
      line-height: 1.6;
      white-space: pre-line;
    }

    .catatan {
      margin-top: 14px;
      color: #6b7280;
      font-size: 12px;
      line-height: 1.5;
      text-align: center;
    }
  </style>
</head>

<body>
  <main class="container">
    <section class="judul">
      <h1>Scanner Absensi Guru</h1>
      <p>Clean Build — Tahap 9F</p>
    </section>

    <section class="card">
      <div id="reader"></div>

      <div class="tombol">
        <button id="tombolMulai" type="button">
          Mulai Kamera
        </button>

        <button id="tombolBerhenti" type="button" disabled>
          Hentikan
        </button>
      </div>
    </section>

    <section id="kotakHasil" class="card hasil idle">
      <h2 id="judulHasil">Scanner siap</h2>

      <p id="detailHasil">
        Tekan tombol Mulai Kamera, lalu arahkan kamera ke QR.
      </p>
    </section>

    <p class="catatan">
      QR divalidasi menggunakan ID dan token.
      Setiap hasil scan dicatat secara aman ke LOG_SCAN.
    </p>
  </main>

  <script>
    const WEB_APP_URL =
      'https://script.google.com/macros/s/AKfycbxn4HNZ8z5rLjqPXfZR4rG6LZLvm3QLHwCUPHbfMeHDUDJNDNPyIPeXv5uSSKxiBL4g/exec';
  
    let scanner = null;
  
    const tombolMulai =
      document.getElementById('tombolMulai');
  
    const tombolBerhenti =
      document.getElementById('tombolBerhenti');
  
    const kotakHasil =
      document.getElementById('kotakHasil');
  
    const judulHasil =
      document.getElementById('judulHasil');
  
    const detailHasil =
      document.getElementById('detailHasil');
  
    let kameraAktif = false;
    let sedangMemproses = false;
  
    tombolMulai.addEventListener(
      'click',
      mulaiKamera
    );
  
    tombolBerhenti.addEventListener(
      'click',
      hentikanKamera
    );
  
  
    async function mulaiKamera() {
      if (kameraAktif) {
        return;
      }
  
      try {
        sedangMemproses = false;
  
        tampilkanHasil(
          'loading',
          'Membuka kamera',
          'Izinkan browser menggunakan kamera.'
        );
  
        scanner = new Html5Qrcode('reader');
  
        await scanner.start(
          {
            facingMode: 'environment'
          },
          {
            fps: 10,
  
            qrbox: {
              width: 250,
              height: 250
            }
          },
          ketikaQrTerbaca,
          function () {
            /*
             * Error pencarian QR per frame
             * tidak perlu ditampilkan.
             */
          }
        );
  
        kameraAktif = true;
        aturTombolKamera();
  
        tampilkanHasil(
          'idle',
          'Kamera aktif',
          'Arahkan kamera ke QR pegawai.'
        );
      } catch (error) {
        kameraAktif = false;
        aturTombolKamera();
  
        tampilkanHasil(
          'gagal',
          'Kamera gagal dibuka',
          'Periksa izin kamera dan pastikan website dibuka melalui HTTPS.'
        );
  
        console.error(error);
      }
    }
  
  
    async function hentikanKamera() {
      if (!scanner || !kameraAktif) {
        kameraAktif = false;
        aturTombolKamera();
        return;
      }
  
      try {
        await scanner.stop();
        scanner.clear();
      } catch (error) {
        console.error(error);
      }
  
      scanner = null;
      kameraAktif = false;
      aturTombolKamera();
    }
  
  
    /**
     * Menerima payload QR dengan format:
     * ID_Pegawai|Token_QR
     */
    async function ketikaQrTerbaca(teksQr) {
      if (sedangMemproses) {
        return;
      }
  
      sedangMemproses = true;
  
      const isiQr = String(teksQr || '')
        .trim()
        .toUpperCase();
  
      await hentikanKamera();
  
      /*
       * ID maksimal 30 karakter.
       * Token harus 64 karakter heksadesimal.
       */
      const hasilFormat = isiQr.match(
        /^([A-Z0-9_-]{1,30})\|([A-F0-9]{64})$/
      );
  
      if (!hasilFormat) {
        tampilkanHasil(
          'gagal',
          'Format QR tidak valid',
          'QR harus berasal dari MASTER_QR versi token.'
        );
  
        return;
      }
  
      /*
       * Hanya ID yang boleh ditampilkan.
       * Token tidak ditampilkan pada halaman.
       */
      const idPegawai = hasilFormat[1];
  
      tampilkanHasil(
        'loading',
        'Memvalidasi QR',
        'ID hasil scan: ' + idPegawai
      );
  
      kirimKeApi(isiQr);
    }
  
  
    /**
     * Mengirim payload lengkap ke backend.
     *
     * Payload tidak ditampilkan kepada pengguna.
     */
    function kirimKeApi(isiQr) {
      const callbackName =
        'callbackScan_' + Date.now();
  
      const elemenScript =
        document.createElement('script');
  
      let batasWaktu;
  
      function hapusPermintaan() {
        clearTimeout(batasWaktu);
        elemenScript.remove();
        delete window[callbackName];
      }
  
      window[callbackName] = function (hasil) {
        hapusPermintaan();
        tampilkanResponsApi(hasil);
      };
  
      elemenScript.onerror = function () {
        hapusPermintaan();
  
        tampilkanHasil(
          'gagal',
          'API tidak dapat dihubungi',
          'Periksa URL Web App dan koneksi internet.'
        );
      };
  
      batasWaktu = setTimeout(function () {
        hapusPermintaan();
  
        tampilkanHasil(
          'gagal',
          'Waktu tunggu habis',
          'Apps Script tidak memberikan respons dalam 15 detik.'
        );
      }, 15000);
  
      const parameter =
        '?aksi=scanQrToken' +
        '&isiQr=' +
        encodeURIComponent(isiQr) +
        '&callback=' +
        encodeURIComponent(callbackName) +
        '&waktu=' +
        Date.now();
  
      elemenScript.src =
        WEB_APP_URL + parameter;
  
      document.body.appendChild(
        elemenScript
      );
    }
  
  
    /**
     * Menampilkan hasil backend tanpa token.
     */
    function tampilkanResponsApi(hasil) {
      if (!hasil || typeof hasil !== 'object') {
        tampilkanHasil(
          'gagal',
          'Respons tidak valid',
          'API memberikan respons yang tidak dikenali.'
        );
  
        return;
      }
  
      const data = hasil.data || {};
  
      if (hasil.berhasil) {
        let detail =
          hasil.pesan || 'Scan berhasil.';
  
        detail +=
          '\nID: ' +
          (data.idPegawai || '-');
  
        detail +=
          '\nNama: ' +
          (data.namaLengkap || '-');
  
        detail +=
          '\nJabatan: ' +
          (data.jabatan || '-');
  
        if (hasil.jenisScan) {
          detail +=
            '\nJenis scan: ' +
            hasil.jenisScan;
        }
  
        if (data.jamMasuk) {
          detail +=
            '\nJam masuk: ' +
            data.jamMasuk;
        }
  
        if (data.jamPulang) {
          detail +=
            '\nJam pulang: ' +
            data.jamPulang;
        }
  
        if (data.statusAbsensi) {
          detail +=
            '\nStatus: ' +
            data.statusAbsensi;
        }
  
        tampilkanHasil(
          'sukses',
          hasil.kode || 'Scan berhasil',
          detail
        );
  
        return;
      }
  
      let detail =
        hasil.pesan || 'Scan ditolak.';
  
      if (data.idPegawai) {
        detail +=
          '\nID: ' +
          data.idPegawai;
      }
  
      if (data.namaLengkap) {
        detail +=
          '\nNama: ' +
          data.namaLengkap;
      }
  
      if (data.statusPegawai) {
        detail +=
          '\nStatus pegawai: ' +
          data.statusPegawai;
      }
  
      if (data.jamServer) {
        detail +=
          '\nJam server: ' +
          data.jamServer;
      }
  
      if (data.statusWaktu) {
        detail +=
          '\nStatus waktu: ' +
          data.statusWaktu;
      }
  
      tampilkanHasil(
        'gagal',
        hasil.kode || 'Scan ditolak',
        detail
      );
    }
  
  
    function tampilkanHasil(
      tipe,
      judul,
      detail
    ) {
      kotakHasil.className =
        'card hasil ' + tipe;
  
      judulHasil.textContent = judul;
      detailHasil.textContent = detail;
    }
  
  
    function aturTombolKamera() {
      tombolMulai.disabled =
        kameraAktif;
  
      tombolBerhenti.disabled =
        !kameraAktif;
  
      tombolMulai.textContent =
        kameraAktif
          ? 'Kamera Aktif'
          : 'Mulai Kamera';
    }
  </script>
</body>
</html>
